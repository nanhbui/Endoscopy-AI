name: Docker — build & publish

# Build BE + FE images on every push to main and on git tags, then push to
# Docker Hub. Manual trigger lets you republish without a code change.
#
# Required GitHub repo secrets (Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME — your hub.docker.com login
#   DOCKERHUB_TOKEN    — access token (NOT password); create at
#                        https://hub.docker.com/settings/security
#
# Resulting images:
#   docker.io/<username>/endoscopy-backend:<tag>
#   docker.io/<username>/endoscopy-frontend:<tag>
# where <tag> is `latest` (main) + `vX.Y.Z` (git tag).

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      api_base:
        description: 'NEXT_PUBLIC_API_BASE baked into FE bundle (leave EMPTY for same-origin behind a reverse proxy — the default deployment)'
        required: false
        default: ''

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: endoscopy-backend
  FRONTEND_IMAGE: endoscopy-frontend
  # Empty = same-origin: the browser calls /upload, /ws/*, … on whatever host
  # serves the page, and a reverse proxy (Caddy) routes them to the backend.
  # This keeps the published image portable. Override per-environment only if you
  # bake a fixed backend URL instead of fronting the FE with a proxy.
  DEFAULT_API_BASE: ''

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          BASE="${{ secrets.DOCKERHUB_USERNAME }}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "be_tags=${BASE}/${{ env.BACKEND_IMAGE }}:${VERSION},${BASE}/${{ env.BACKEND_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
            echo "fe_tags=${BASE}/${{ env.FRONTEND_IMAGE }}:${VERSION},${BASE}/${{ env.FRONTEND_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "be_tags=${BASE}/${{ env.BACKEND_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
            echo "fe_tags=${BASE}/${{ env.FRONTEND_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
          fi
          # Empty input → same-origin (DEFAULT_API_BASE is intentionally empty).
          API_BASE="${{ github.event.inputs.api_base }}"
          echo "api_base=${API_BASE}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.be_tags }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.fe_tags }}
          build-args: |
            NEXT_PUBLIC_API_BASE=${{ steps.tags.outputs.api_base }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
