name: Docker — build & publish

# Build BE + FE images on every push to main and on git tags, then push to
# Docker Hub. Manual trigger lets you republish without a code change.
#
# Required GitHub repo secrets (Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME — your hub.docker.com login
#   DOCKERHUB_TOKEN    — access token (NOT password); create at
#                        https://hub.docker.com/settings/security
#
# Resulting images:
#   docker.io/<username>/endoscopy-backend:<tag>
#   docker.io/<username>/endoscopy-frontend:<tag>
# where <tag> is `latest` (main) + `vX.Y.Z` (git tag).

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ngrok_api_base:
        description: 'NEXT_PUBLIC_API_BASE baked into FE bundle'
        required: false
        default: 'https://ferris-smudgy-fondue.ngrok-free.dev'

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: endoscopy-backend
  FRONTEND_IMAGE: endoscopy-frontend
  # Default URL baked into the FE bundle. Override per-environment by
  # rebuilding the FE image with a different --build-arg NEXT_PUBLIC_API_BASE.
  DEFAULT_API_BASE: https://ferris-smudgy-fondue.ngrok-free.dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          BASE="${{ secrets.DOCKERHUB_USERNAME }}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "be_tags=${BASE}/${{ env.BACKEND_IMAGE }}:${VERSION},${BASE}/${{ env.BACKEND_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
            echo "fe_tags=${BASE}/${{ env.FRONTEND_IMAGE }}:${VERSION},${BASE}/${{ env.FRONTEND_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "be_tags=${BASE}/${{ env.BACKEND_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
            echo "fe_tags=${BASE}/${{ env.FRONTEND_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
          fi
          API_BASE="${{ github.event.inputs.ngrok_api_base }}"
          if [[ -z "$API_BASE" ]]; then API_BASE="${{ env.DEFAULT_API_BASE }}"; fi
          echo "api_base=${API_BASE}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.be_tags }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.fe_tags }}
          build-args: |
            NEXT_PUBLIC_API_BASE=${{ steps.tags.outputs.api_base }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
