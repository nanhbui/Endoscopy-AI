# ── Endoscopy AI — DEPLOY-ONLY compose (send this to the target server) ───────
#
# Pulls the public images and runs them. No repo, no build, no source needed.
# Rename to docker-compose.yml on the target if you prefer.
#
#   docker compose -f docker-compose.deploy.yml up -d
#   # custom UI port:  FRONTEND_PORT=8080 docker compose -f docker-compose.deploy.yml up -d
#
# Target host needs ONLY: an NVIDIA GPU + nvidia-container-toolkit + Docker (and
# your user in the `docker` group).
#
# Open in a browser:  http://<this-server-ip>:${FRONTEND_PORT:-3000}
#
# NOTE on the VLM: ollama-init auto-pulls bge-m3 (embeddings). The medgemma-4b
# report model may not be in a public registry — if it fails to pull, provide it
# once (see the WARN log); it then persists in the ollama_models volume.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: endoscopy-ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    container_name: endoscopy-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        ollama pull bge-m3 &&
        (ollama pull medgemma-4b ||
         echo 'WARN: medgemma-4b not pullable — provide it once: ollama create medgemma-4b -f Modelfile (persists in ollama_models).')
    restart: "no"

  backend:
    image: docker.io/ngocanh031004/endoscopy-backend:v1
    container_name: endoscopy-backend
    restart: unless-stopped
    ports:
      - "8003:8001"        # host 8003 → container 8001 (the FE calls host:8003)
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - LLM_BACKEND=ollama
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - OLLAMA_MODEL=medgemma-4b
      - DEDUP_BY_TRACK_ID=auto
      - ENDOSCOPY_DB_PATH=/data/db/endoscopy.db
      - ENDOSCOPY_LIBRARY_DIR=/data/library
      - ENDOSCOPY_UPLOAD_DIR=/data/uploads
    env_file:
      - path: ./backend.env        # optional (e.g. OPENAI_API_KEY); ignored if absent
        required: false
    volumes:
      - endoscopy_db:/data/db
      - endoscopy_library:/data/library
      - endoscopy_uploads:/data/uploads
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: docker.io/ngocanh031004/endoscopy-frontend:v1
    container_name: endoscopy-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  endoscopy_db:
  endoscopy_library:
  endoscopy_uploads:
  ollama_models:
